<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBOTCAR — COCKPIT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">◈ ROBOTCAR</div>
  <div class="hdr-right">
    <span class="hdr-inline-telem">
      CPU: <span id="disp-cpu-temp" class="hdr-telem-val">--</span>°C
      <span id="disp-cpu-load" class="hdr-telem-val">--%</span>
      &nbsp;&nbsp;MEM: <span id="disp-mem" class="hdr-telem-val">--%</span>
      &nbsp;&nbsp;MOTOR: <span id="disp-err" class="hdr-telem-val">OK</span>
      &nbsp;&nbsp;WiFi: <span id="disp-rssi" class="hdr-telem-val">--</span> dBm
      &nbsp;&nbsp;THR: <span id="disp-thr" class="hdr-telem-val">--</span>
      &nbsp;&nbsp;UP: <span id="disp-uptime" class="hdr-telem-val">--</span>
    </span>
    <span class="hdr-sep">|</span>
    <span id="gp-status" class="gp-status">GAMEPAD --</span>
    <span id="kbd-hint" class="kbd-hint">W/A/S/D · SPACE:BRAKE</span>
    <span id="ws-status" class="ws-status disconnected">● OFFLINE</span>
  </div>
</header>

<div class="cockpit">

  <!-- ── LEFT: Camera + Controls ──────────────────── -->
  <div class="cam-col">

    <!-- Camera frame (closes before gauge row) -->
    <div class="cam-frame-wrap">
      <div class="cam-frame">
        <img id="camera-stream" alt="CAMERA FEED">
        <div class="hud-corner tl"></div>
        <div class="hud-corner tr"></div>
        <div class="hud-corner bl"></div>
        <div class="hud-corner br"></div>
      </div>
    </div>

    <!-- Speed / Accel / Motor temperature gauges (between camera and mode buttons) -->
    <div class="ctrl-gauge-row">
      <div class="ctrl-gauge-mini">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-red" id="g-speed" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-speed" x="50" y="50">0.0</text>
          <text class="g-unit" x="50" y="63">m/s</text>
          <text class="g-lbl" x="50" y="36">SPEED</text>
        </svg>
      </div>
      <div class="ctrl-gauge-mini">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-red" id="g-accel" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-accel" x="50" y="50">0.0</text>
          <text class="g-unit" x="50" y="63">m/s²</text>
          <text class="g-lbl" x="50" y="36">ACCEL</text>
        </svg>
      </div>
      <div class="ctrl-gauge-mini">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-red" id="g-temp-left" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-temp-left" x="50" y="50">--</text>
          <text class="g-unit" x="50" y="63">°C</text>
          <text class="g-lbl" x="50" y="36">LEFT</text>
        </svg>
      </div>
      <div class="ctrl-gauge-mini">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-red" id="g-temp-right" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-temp-right" x="50" y="50">--</text>
          <text class="g-unit" x="50" y="63">°C</text>
          <text class="g-lbl" x="50" y="36">RIGHT</text>
        </svg>
      </div>
      <div class="ctrl-gauge-mini">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-red" id="g-temp-steer" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-temp-steer" x="50" y="50">--</text>
          <text class="g-unit" x="50" y="63">°C</text>
          <text class="g-lbl" x="50" y="36">STEER</text>
        </svg>
      </div>
      <div class="ctrl-gauge-mini">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-red" id="g-vsig" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-vsig" x="50" y="50">0.0</text>
          <text class="g-unit" x="50" y="63">V</text>
          <text class="g-lbl" x="50" y="36">SIGNAL</text>
        </svg>
      </div>
      <div class="ctrl-gauge-mini">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-red" id="g-volt" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-vpow" x="50" y="50">0.0</text>
          <text class="g-unit" x="50" y="63">V</text>
          <text class="g-lbl" x="50" y="36">POWER</text>
        </svg>
      </div>
    </div>

    <div class="ctrl-bar">
      <div class="ctrl-main">
        <div class="mode-bar">
          <button id="btn-drive"     class="act-btn">DRIVE</button>
          <button id="btn-autobrake" class="act-btn">AUTO BRAKE</button>
          <button id="btn-traction"  class="act-btn">TRACTION</button>
          <button id="btn-stability" class="act-btn">STABILITY</button>
          <div class="mode-sep"></div>
          <button id="btn-remote"    class="mode-btn">REMOTE</button>
          <button id="btn-mode1"     class="mode-btn">MODE 1</button>
          <button id="btn-mode2"     class="mode-btn">MODE 2</button>
        </div>
        <div class="slider-action-row">
          <div class="sliders-block">
            <div class="sl-row">
              <span class="sl-lbl">SPD</span>
              <input type="range" id="slider-speed" min="0" max="127" value="10" step="1">
              <span class="sl-val" id="speed-val">0.0 m/s</span>
            </div>
            <div class="sl-row">
              <span class="sl-lbl">ACC</span>
              <input type="range" id="slider-accel" min="0" max="127" value="10" step="1">
              <span class="sl-val" id="accel-val">0.0 m/s²</span>
            </div>
          </div>
          <div class="action-btns">
            <button id="btn-brake"     class="act-btn"><span>⏹</span><span>BRAKE</span></button>
            <button id="btn-headlight" class="act-btn"><span>💡</span><span>LIGHT</span></button>
            <button id="btn-hazard"    class="act-btn hazard"><span>⚠</span><span>HAZARD</span></button>
            <button id="btn-horn"      class="act-btn"><span>📯</span><span>HORN</span></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT: Instruments ────────────────────────── -->
  <div class="inst-col">

    <!-- Radar (lines/dots generated by JS) -->
    <div class="radar-wrap">
      <svg id="radar-svg" class="radar-svg" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="88" class="radar-bg"/>
        <circle cx="100" cy="100" r="22" class="radar-grid"/>
        <circle cx="100" cy="100" r="44" class="radar-grid"/>
        <circle cx="100" cy="100" r="66" class="radar-grid"/>
        <circle cx="100" cy="100" r="88" class="radar-grid"/>
        <g id="radar-divs"></g>
        <polygon id="radar-poly" class="radar-poly"/>
        <g id="radar-dots"></g>
        <text class="radar-lbl" x="100" y="8">F</text>
        <text class="radar-lbl" x="172" y="32">FR</text>
        <text class="radar-lbl" x="196" y="102">R</text>
        <text class="radar-lbl" x="172" y="172">BR</text>
        <text class="radar-lbl" x="100" y="196">B</text>
        <text class="radar-lbl" x="28"  y="172">BL</text>
        <text class="radar-lbl" x="4"   y="102">L</text>
        <text class="radar-lbl" x="28"  y="32">FL</text>
        <circle cx="100" cy="100" r="4" class="radar-center"/>
      </svg>
    </div>

    <!-- Radar range slider -->
    <div class="radar-range-wrap">
      <div class="sl-row">
        <span class="sl-lbl">RNG</span>
        <input type="range" id="slider-radar-range" min="500" max="12000" value="2500" step="500">
        <span class="sl-val" id="radar-range-val">250 cm</span>
      </div>
    </div>

    <!-- IMU: Attitude Indicator + G-meter -->
    <div class="gauge-row">
      <!-- Artificial Horizon Indicator -->
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <defs>
            <clipPath id="ahi-clip"><circle cx="50" cy="50" r="37"/></clipPath>
          </defs>
          <circle cx="50" cy="50" r="38" fill="#0a0a0a"/>
          <g id="ahi-scene" clip-path="url(#ahi-clip)">
            <rect x="-150" y="-150" width="400" height="200" fill="#0d2744"/>
            <rect x="-150" y="50"   width="400" height="200" fill="#3d1e08"/>
            <line x1="-150" y1="50" x2="250" y2="50" stroke="rgba(255,255,255,0.85)" stroke-width="1.5"/>
          </g>
          <line x1="16" y1="50" x2="40" y2="50" stroke="#f0c000" stroke-width="3" stroke-linecap="round"/>
          <line x1="60" y1="50" x2="84" y2="50" stroke="#f0c000" stroke-width="3" stroke-linecap="round"/>
          <circle cx="50" cy="50" r="2.5" fill="#f0c000"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="#0a0a0a" stroke-width="6"/>
          <text class="g-lbl" x="50" y="36">AHI</text>
          <text class="g-val" id="disp-pitch" x="32" y="82" style="font-size:9px">0°</text>
          <text class="g-val" id="disp-roll"  x="68" y="82" style="font-size:9px">0°</text>
          <text class="g-unit" x="32" y="90">PITCH</text>
          <text class="g-unit" x="68" y="90">ROLL</text>
        </svg>
      </div>
      <!-- G-meter -->
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="38" fill="#050505"/>
          <circle cx="50" cy="50" r="19" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
          <line x1="12" y1="50" x2="88" y2="50" stroke="#1a1a1a" stroke-width="0.8"/>
          <line x1="50" y1="12" x2="50" y2="88" stroke="#1a1a1a" stroke-width="0.8"/>
          <circle id="g-dot" cx="50" cy="50" r="4" fill="#16a34a"/>
          <circle cx="50" cy="50" r="38" fill="none" stroke="#0a0a0a" stroke-width="6"/>
          <text class="g-lbl" x="50" y="36">G-METER</text>
          <text class="g-unit" x="50" y="14">F</text>
          <text class="g-unit" x="88" y="53">R</text>
          <text class="g-unit" x="50" y="95">B</text>
          <text class="g-unit" x="12" y="53">L</text>
        </svg>
      </div>
    </div>


  </div><!-- /inst-col -->
</div><!-- /cockpit -->

<script src="main.js?v=7"></script>
</body>
</html>
