simulation:
  dt: 0.02
  screen_width: 1200
  screen_height: 800
  map_margin: 0.5
  command_latency_ms: 40    # アクチュエータ遅延[ms]（UART往復+STM32+サーボ応答の模擬、実機相当）
  lidar_noise_sigma: 0.02   # 後方互換（lidar.noise_floor_m 未指定時のフォールバック）
  lidar:                    # LD06 データシート準拠のセンサモデル
    max_range: 12.0         # [m]
    min_range: 0.02         # [m]
    noise_floor_m: 0.01     # 近距離ノイズ下限 1σ [m]
    noise_pct: 0.006        # 距離比例ノイズ（≒±1%クラス）σ=max(floor, pct×距離)
    n_rays: 360             # 点数（LD06実機≒450/0.8°。互換のため既定360/1°）
  speed_multipliers: [0.5, 1.0, 2.0]
  show_center_line: false
  show_racing_line: false
  imu:
    enabled: true          # 実機IMU(AHRSヨー)を模擬。falseでIMUなし(従来挙動)
    noise_deg: 0.3         # ヨー観測ノイズ[deg]
    bias_walk_deg: 0.0005  # ヨーバイアスのランダムウォーク[deg/step]
    bias_max_deg: 0.5      # 残留バイアス上限[deg]（AHRS+地磁気で有界）

server:
  host: "0.0.0.0"
  port: 8000
  broadcast_hz: 20

localization:
  mode: "slam"    # "slam"=実機相当（LiDARのみ自己位置推定）| "cheat"=真値（デバッグ用）

slam:
  resolution: 0.03           # [m/cell] 占有格子解像度（高精度化：5cm→3cm）
  map_rate_divider: 8        # 地図配信の間引き（SLAM実行何回に1回）
  loc_rate_divider: 1        # SLAM自己位置推定の実行間隔（制御50Hz/1=50Hz、動きを小さく保ち頑健化）

planner:
  course_width: 1.0          # [m] コース幅（中心線から壁までの倍）
  waypoint_spacing: 0.1      # [m] 経路リサンプリング間隔
  lookahead_min: 0.4         # [m] 最小先読み距離
  lookahead_gain: 0.3        # [s] 速度比例の先読みゲイン（Ld = min + gain*v）
  lookahead_max: 1.2         # [m] 最大先読み距離
  cruise_speed: 1.5          # [m/s] 直線巡航速度
  min_speed: 0.4             # [m/s] コーナー最低速度
  curvature_slowdown: 1.0    # 曲率による減速係数（大きいほど減速）

obstacle:                    # 動的障害物（人・車）の検知・回避
  enabled: true
  detect_range: 1.8          # [m] 反応開始距離
  stop_dist: 0.45            # [m] 経路上障害物で停止
  estop_dist: 0.40           # [m] 直前方至近の緊急停止
  fov_deg: 70                # [deg] 前方探索半角
  path_band: 0.30            # [m] 経路近傍判定（壁と障害物の区別）
  avoid_gain: 28.0           # 操舵回避ゲイン

racing_line:
  enabled: true              # コース構築時にレーシングラインを自動生成するか
  safety_margin: 0.15        # [m] 車体端から壁への余裕（αクリップ）
  # vehicle_half_width: 0.11 # [m] 未指定なら車両トレッド/2+0.03で自動算出
  a_lat: 4.0                 # [m/s²] 横加速度上限（コーナー速度）
  a_long: 3.0                # [m/s²] 縦加速度上限（加減速）
  min_speed: 0.5             # [m/s] 速度プロファイル下限
  smooth_iters: 2            # 最適化後の平滑化回数

watchdog:
  command_timeout_ms: 500
