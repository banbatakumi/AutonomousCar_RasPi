<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBOTCAR — COCKPIT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">◈ ROBOTCAR</div>
  <div class="hdr-right">
    <span id="kbd-hint" class="kbd-hint">W/A/S/D · SPACE:BRAKE</span>
    <span id="ws-status" class="ws-status disconnected">● OFFLINE</span>
  </div>
</header>

<div class="cockpit">

  <!-- ── LEFT: Camera ──────────────────────────────── -->
  <div class="cam-col">
    <div class="cam-frame">
      <img id="camera-stream" src="/stream" alt="CAMERA FEED">
      <div class="hud-corner tl"></div>
      <div class="hud-corner tr"></div>
      <div class="hud-corner bl"></div>
      <div class="hud-corner br"></div>
    </div>

    <div class="dist-bar">
      <div class="dist-cell front">
        <span class="dist-arrow">▲</span>
        <span class="dist-label">FRONT</span>
        <span class="dist-val" id="disp-front">-- cm</span>
      </div>
      <div class="dist-cell left">
        <span class="dist-arrow">◀</span>
        <span class="dist-label">LEFT</span>
        <span class="dist-val" id="disp-left">-- cm</span>
      </div>
      <div class="dist-cell right">
        <span class="dist-arrow">▶</span>
        <span class="dist-label">RIGHT</span>
        <span class="dist-val" id="disp-right">-- cm</span>
      </div>
      <div class="dist-cell back">
        <span class="dist-arrow">▼</span>
        <span class="dist-label">BACK</span>
        <span class="dist-val" id="disp-back">-- cm</span>
      </div>
    </div>
  </div>

  <!-- ── RIGHT: Instruments ────────────────────────── -->
  <div class="inst-col">

    <!-- Gauge rows (2×2) -->
    <div class="gauge-row">
      <!-- Speed gauge -->
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-red" id="g-speed" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-speed" x="50" y="50">0.0</text>
          <text class="g-unit" x="50" y="63">m/s</text>
          <text class="g-lbl" x="50" y="22">SPEED</text>
        </svg>
      </div>
      <!-- Acceleration gauge -->
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-yellow" id="g-accel" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-accel" x="50" y="50">0.0</text>
          <text class="g-unit" x="50" y="63">m/s²</text>
          <text class="g-lbl" x="50" y="22">ACCEL</text>
        </svg>
      </div>
    </div>
    <div class="gauge-row">
      <!-- Signal voltage gauge -->
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-blue" id="g-vsig" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-vsig" x="50" y="50">0.0</text>
          <text class="g-unit" x="50" y="63">V SIG</text>
          <text class="g-lbl" x="50" y="22">SIGNAL</text>
        </svg>
      </div>
      <!-- Power voltage gauge -->
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 100 100">
          <circle class="g-track" cx="50" cy="50" r="38"/>
          <circle class="g-fill g-fill-green" id="g-volt" cx="50" cy="50" r="38"/>
          <text class="g-val" id="disp-vpow" x="50" y="50">0.0</text>
          <text class="g-unit" x="50" y="63">V PWR</text>
          <text class="g-lbl" x="50" y="22">POWER</text>
        </svg>
      </div>
    </div>

    <!-- Sliders -->
    <div class="sliders-block">
      <div class="sl-row">
        <span class="sl-lbl">SPD</span>
        <input type="range" id="slider-speed" min="0" max="127" value="0" step="1">
        <span class="sl-val" id="speed-val">0.0 m/s</span>
      </div>
      <div class="sl-row">
        <span class="sl-lbl">ACC</span>
        <input type="range" id="slider-accel" min="0" max="127" value="0" step="1">
        <span class="sl-val" id="accel-val">0.0 m/s²</span>
      </div>
    </div>

    <!-- Switches -->
    <div class="sw-block">
      <label class="sw-item">
        <input type="checkbox" id="sw-drive">
        <span class="sw-track"><span class="sw-thumb"></span></span>
        <span class="sw-name">DRIVE</span>
      </label>
      <label class="sw-item">
        <input type="checkbox" id="sw-remote">
        <span class="sw-track"><span class="sw-thumb"></span></span>
        <span class="sw-name">REMOTE</span>
      </label>
    </div>

    <!-- Buttons -->
    <div class="btn-block">
      <button id="btn-headlight" class="act-btn">💡 LIGHT</button>
      <button id="btn-hazard"    class="act-btn hazard">⚠ HAZARD</button>
    </div>

    <!-- Telemetry strip -->
    <div class="telem-strip">
      <div class="tl-cell" id="disp-err-item">
        <span class="tl-lbl">MOTOR</span>
        <span class="tl-val" id="disp-err">OK</span>
      </div>
    </div>

  </div><!-- /inst-col -->
</div><!-- /cockpit -->

<script src="main.js"></script>
</body>
</html>
